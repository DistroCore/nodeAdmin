name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Parallel: Static Analysis ────────────────────────────────────────────
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  # ── Parallel: Unit Tests ─────────────────────────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coreApi

  # ── Parallel: Build ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── Sequential: Integration + Acceptance ─────────────────────────────────
  test-integration:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Setup Infrastructure
        uses: ./.github/actions/setup-stack

      - name: Integration Tests
        run: npm run test:coreApi:integration

      - name: M2 Acceptance
        run: npm run m2:acceptance:auto
        timeout-minutes: 5
        env:
          M2_INCLUDE_PGBOUNCER_SMOKE: skip

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down

