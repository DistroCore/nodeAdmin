x-coreapi-scale-common: &coreapi-scale-common
  build:
    context: .
    dockerfile: apps/coreApi/Dockerfile
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment:
    DATABASE_URL: postgres://nodeadmin:nodeadmin@postgres:5432/nodeadmin
    REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:-}
    PORT: '11451'
    JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
    JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
    FRONTEND_ORIGINS: http://localhost,http://localhost:80,http://adminportal,http://nginx-scale
    KAFKA_BROKERS: kafka:29092
    OUTBOX_PUBLISHER_ENABLED: 'false'
  healthcheck:
    test:
      [
        'CMD',
        'node',
        '-e',
        "const http = require('http'); const req = http.get('http://127.0.0.1:11451/api/v1/health', r => { process.exit(r.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); setTimeout(() => { req.destroy(); process.exit(1); }, 3000)",
      ]
    interval: 5s
    timeout: 5s
    retries: 20
    start_period: 30s
  profiles:
    - phase2-scale
  restart: unless-stopped

services:
  coreapi-node1:
    <<: *coreapi-scale-common
    container_name: nodeadmin-coreapi-node1
    environment:
      DATABASE_URL: postgres://nodeadmin:nodeadmin@postgres:5432/nodeadmin
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:-}
      PORT: '11451'
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      FRONTEND_ORIGINS: http://localhost,http://localhost:80,http://adminportal,http://nginx-scale
      KAFKA_BROKERS: kafka:29092
      OUTBOX_PUBLISHER_ENABLED: 'false'
      INSTANCE_ID: coreapi-node1
    ports:
      - '11461:11451'

  coreapi-node2:
    <<: *coreapi-scale-common
    container_name: nodeadmin-coreapi-node2
    environment:
      DATABASE_URL: postgres://nodeadmin:nodeadmin@postgres:5432/nodeadmin
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:-}
      PORT: '11451'
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      FRONTEND_ORIGINS: http://localhost,http://localhost:80,http://adminportal,http://nginx-scale
      KAFKA_BROKERS: kafka:29092
      OUTBOX_PUBLISHER_ENABLED: 'false'
      INSTANCE_ID: coreapi-node2
    ports:
      - '11462:11451'

  coreapi-node3:
    <<: *coreapi-scale-common
    container_name: nodeadmin-coreapi-node3
    environment:
      DATABASE_URL: postgres://nodeadmin:nodeadmin@postgres:5432/nodeadmin
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES:-}
      PORT: '11451'
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      FRONTEND_ORIGINS: http://localhost,http://localhost:80,http://adminportal,http://nginx-scale
      KAFKA_BROKERS: kafka:29092
      OUTBOX_PUBLISHER_ENABLED: 'false'
      INSTANCE_ID: coreapi-node3
    ports:
      - '11463:11451'

  nginx-scale:
    image: nginx:1.27-alpine
    container_name: nodeadmin-nginx-scale
    depends_on:
      coreapi-node1:
        condition: service_healthy
      coreapi-node2:
        condition: service_healthy
      coreapi-node3:
        condition: service_healthy
    profiles:
      - phase2-scale
    ports:
      - '3444:3443'
    volumes:
      - ./infra/nginx/nginx.phase2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro

  redis-cluster-node-1:
    image: redis:7.2-alpine
    profiles:
      - phase2-redis-cluster
    command:
      [
        'redis-server',
        '--port',
        '7001',
        '--cluster-enabled',
        'yes',
        '--cluster-config-file',
        'nodes.conf',
        '--cluster-node-timeout',
        '5000',
        '--appendonly',
        'yes',
        '--protected-mode',
        'no',
        '--bind',
        '0.0.0.0',
      ]
    ports:
      - '57001:7001'
    volumes:
      - redis_cluster_1:/data

  redis-cluster-node-2:
    image: redis:7.2-alpine
    profiles:
      - phase2-redis-cluster
    command:
      [
        'redis-server',
        '--port',
        '7002',
        '--cluster-enabled',
        'yes',
        '--cluster-config-file',
        'nodes.conf',
        '--cluster-node-timeout',
        '5000',
        '--appendonly',
        'yes',
        '--protected-mode',
        'no',
        '--bind',
        '0.0.0.0',
      ]
    ports:
      - '57002:7002'
    volumes:
      - redis_cluster_2:/data

  redis-cluster-node-3:
    image: redis:7.2-alpine
    profiles:
      - phase2-redis-cluster
    command:
      [
        'redis-server',
        '--port',
        '7003',
        '--cluster-enabled',
        'yes',
        '--cluster-config-file',
        'nodes.conf',
        '--cluster-node-timeout',
        '5000',
        '--appendonly',
        'yes',
        '--protected-mode',
        'no',
        '--bind',
        '0.0.0.0',
      ]
    ports:
      - '57003:7003'
    volumes:
      - redis_cluster_3:/data

  redis-cluster-node-4:
    image: redis:7.2-alpine
    profiles:
      - phase2-redis-cluster
    command:
      [
        'redis-server',
        '--port',
        '7004',
        '--cluster-enabled',
        'yes',
        '--cluster-config-file',
        'nodes.conf',
        '--cluster-node-timeout',
        '5000',
        '--appendonly',
        'yes',
        '--protected-mode',
        'no',
        '--bind',
        '0.0.0.0',
      ]
    ports:
      - '57004:7004'
    volumes:
      - redis_cluster_4:/data

  redis-cluster-node-5:
    image: redis:7.2-alpine
    profiles:
      - phase2-redis-cluster
    command:
      [
        'redis-server',
        '--port',
        '7005',
        '--cluster-enabled',
        'yes',
        '--cluster-config-file',
        'nodes.conf',
        '--cluster-node-timeout',
        '5000',
        '--appendonly',
        'yes',
        '--protected-mode',
        'no',
        '--bind',
        '0.0.0.0',
      ]
    ports:
      - '57005:7005'
    volumes:
      - redis_cluster_5:/data

  redis-cluster-node-6:
    image: redis:7.2-alpine
    profiles:
      - phase2-redis-cluster
    command:
      [
        'redis-server',
        '--port',
        '7006',
        '--cluster-enabled',
        'yes',
        '--cluster-config-file',
        'nodes.conf',
        '--cluster-node-timeout',
        '5000',
        '--appendonly',
        'yes',
        '--protected-mode',
        'no',
        '--bind',
        '0.0.0.0',
      ]
    ports:
      - '57006:7006'
    volumes:
      - redis_cluster_6:/data

  redis-cluster-init:
    image: redis:7.2-alpine
    profiles:
      - phase2-redis-cluster
    depends_on:
      - redis-cluster-node-1
      - redis-cluster-node-2
      - redis-cluster-node-3
      - redis-cluster-node-4
      - redis-cluster-node-5
      - redis-cluster-node-6
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -eu
        for node in redis-cluster-node-1:7001 redis-cluster-node-2:7002 redis-cluster-node-3:7003 redis-cluster-node-4:7004 redis-cluster-node-5:7005 redis-cluster-node-6:7006; do
          host="$${node%:*}"
          port="$${node##*:}"
          until redis-cli -h "$$host" -p "$$port" ping >/dev/null 2>&1; do
            sleep 1
          done
        done
        if redis-cli -h redis-cluster-node-1 -p 7001 cluster info 2>/dev/null | grep -q 'cluster_state:ok'; then
          exit 0
        fi
        yes yes | redis-cli --cluster create \
          redis-cluster-node-1:7001 \
          redis-cluster-node-2:7002 \
          redis-cluster-node-3:7003 \
          redis-cluster-node-4:7004 \
          redis-cluster-node-5:7005 \
          redis-cluster-node-6:7006 \
          --cluster-replicas 1

volumes:
  redis_cluster_1:
  redis_cluster_2:
  redis_cluster_3:
  redis_cluster_4:
  redis_cluster_5:
  redis_cluster_6:
