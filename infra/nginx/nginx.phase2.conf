map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream coreapi_http_cluster {
  least_conn;
  server coreapi-node1:11451 max_fails=3 fail_timeout=10s;
  server coreapi-node2:11451 max_fails=3 fail_timeout=10s;
  server coreapi-node3:11451 max_fails=3 fail_timeout=10s;
}

upstream coreapi_ws_cluster {
  hash $remote_addr$http_user_agent consistent;
  server coreapi-node1:11451 max_fails=3 fail_timeout=10s;
  server coreapi-node2:11451 max_fails=3 fail_timeout=10s;
  server coreapi-node3:11451 max_fails=3 fail_timeout=10s;
}

server {
  listen 3443 ssl;
  server_name localhost 127.0.0.1;

  ssl_certificate /etc/nginx/certs/dev-cert.pem;
  ssl_certificate_key /etc/nginx/certs/dev-key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  location /socket.io/ {
    proxy_pass http://coreapi_ws_cluster;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_next_upstream off;
    add_header X-Upstream-Node $upstream_addr always;
  }

  location / {
    proxy_pass http://coreapi_http_cluster;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    add_header X-Upstream-Node $upstream_addr always;
  }
}
